name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd devops-node-app || git clone https://github.com/Biswanathpatra12/devops-node-app.git
          cd devops-node-app
          git pull
          docker build -t myapp .
          docker rm -f myapp-container || true
          docker run -d -p 3000:3000 --name myapp-container --restart always myapp
